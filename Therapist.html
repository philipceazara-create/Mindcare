<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCare | Therapists</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body,html{
  height:100%;
  font-family: Arial, sans-serif;
  color:white;
}

/* ===== HERO BACKGROUND ===== */
.hero,
.therapist-details{
  position:relative;
  width:100%;
  height:100vh;
  background: linear-gradient(rgba(0,60,0,0.5),rgba(0,60,0,0.5)),
              url('forestpon.jpg') no-repeat center center;
  background-size:cover;
  display:flex;
  flex-direction:column;
  transition:0.5s ease;
}

/* ===== NAVBAR (GLASS STYLE) ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.nav-items{
  display:flex;
  gap:30px;
  font-size:16px;
}

.nav-items div{
  cursor:pointer;
  transition:0.3s;
}

.nav-items div:hover{
  opacity:0.7;
}

/* ===== CENTER CONTENT ===== */
.hero-content,
.therapist-content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* ===== GLASS CARD ===== */
.options-container,
.therapist-info{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:25px;
  width:100%;
  max-width:600px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.4s;
}

.options-container:hover,
.therapist-info:hover{
  transform:translateY(-8px);
}

/* ===== TITLE ===== */
h1{
  margin-bottom:25px;
  font-size:36px;
}

/* ===== OPTION BUTTONS ===== */
.option-buttons{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.option-btn{
  padding:14px 20px;
  border-radius:30px;
  border:none;
  background:white;
  color:#1e4d1e;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.option-btn:hover{
  background:#d4ffd4;
  transform:translateY(-3px);
}

/* ===== DETAILS CONTENT ===== */
.therapist-info p{
  margin-bottom:15px;
  line-height:1.6;
}

.contact{
  background:rgba(255,255,255,0.25);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

/* ===== BACK BUTTON INSIDE DETAILS ===== */
.details-back{
  margin-top:20px;
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:white;
  color:#1e4d1e;
  cursor:pointer;
  transition:0.3s;
}

.details-back:hover{
  background:#d4ffd4;
}

/* ===== BOTTOM BUTTONS ===== */
.bottom-buttons{
  position:absolute;
  bottom:25px;
  left:40px;
  right:40px;
  display:flex;
  justify-content:space-between;
}

.back-button{
  padding:12px 28px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.back-button:hover{
  background:rgba(255,255,255,0.35);
}

/* ===== HIDDEN DETAILS PAGE ===== */
.therapist-details{
  display:none;
  position:absolute;
  top:0;
  left:0;
}

.therapist-details.active{
  display:flex;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .navbar{
    padding:15px 25px;
  }
  .bottom-buttons{
    flex-direction:column;
    gap:10px;
    align-items:center;
  }
}

</style>
</head>
<body>

<!-- ===== MAIN PAGE ===== -->
<div class="hero">

  <div class="navbar">
    <div class="logo">MindCare</div>
    <div class="nav-items">
     <a href="About.html">About</a>
      
    </div>
  </div>

  <div class="hero-content">
    <div class="options-container">
      <h1>List of Therapist</h1>
      <div class="option-buttons">
        <button class="option-btn" onclick="showTherapistDetails(1)">Espada Psychological Consultancy</button>
        <button class="option-btn" onclick="showTherapistDetails(2)">PHILIPPINE MENTAL HEALTH ASSOCIATION</button>
        <button class="option-btn" onclick="showTherapistDetails(3)">Bright Space Behavioral Therapy</button>
        <button class="option-btn" onclick="showTherapistDetails(4)">Lily and Co</button>
      </div>
    </div>
  </div>

  <div class="bottom-buttons">
    <a href="Frontpage.html"><button class="back-button">Back</button></a>
    <a href="Frontpage.html"><button class="back-button">Back to the Homepage</button></a>
  </div>

</div>

<!-- ===== DETAILS PAGE ===== -->
<div class="therapist-details" id="therapistDetails">

  <div class="navbar">
    <div class="logo">MindCare</div>
    <div class="nav-items">
      <div>Therapist</div>
      <div>About</div>
    </div>
  </div>

  <div class="therapist-content">
    <div class="therapist-info" id="therapistInfo"></div>
  </div>

</div>

<script>
const therapistData = {
1:{
name:"Espada Psychological Consultancy",
description:"Espada Psychological Consultancy specializes in cognitive behavioral therapy (CBT), family counseling, and stress management. Our team of licensed psychologists provides personalized sessions to help you navigate life's challenges with empathy and expertise.",
services:"Services: Individual therapy, couples counseling, group sessions.",
contact:"Contact: info@espada.com | Phone: (02) 987-6543 | Location: Manila, Philippines"
},
2:{
name:"PHILIPPINE MENTAL HEALTH ASSOCIATION",
description:"The Philippine Mental Health Association (PMHA) is a non-profit organization dedicated to promoting mental health awareness, advocacy, and accessible services across the country.",
services:"Services: Hotlines, workshops, advocacy programs.",
contact:"Contact: pmha@mentalhealth.ph | Phone: 02-123-4567 | Website: pmha.org"
},
3:{
name:"Bright Space Behavioral Therapy",
description:"Bright Space focuses on behavioral therapy for children, adolescents, and families using evidence-based approaches like ABA.",
services:"Services: Child therapy, parent training, school consultations.",
contact:"Contact: brightspace@therapy.ph | Phone: (02) 555-0123 | Location: Quezon City"
},
4:{
name:"Lily and Co",
description:"Lily and Co offers holistic counseling services tailored for women, families, and individuals seeking work-life balance.",
services:"Services: Women's health counseling, family therapy, wellness coaching.",
contact:"Contact: hello@lilyandco.ph | Phone: (02) 777-8888 | Location: Makati"
}
};

function showTherapistDetails(option){
const data=therapistData[option];
if(!data) return;

document.getElementById('therapistInfo').innerHTML=`
<h1>${data.name}</h1>
<p>${data.description}</p>
<p><strong>${data.services}</strong></p>
<div class="contact"><strong>${data.contact}</strong></div>
<button class="details-back" onclick="showMainPage()">Back to List</button>
`;

document.getElementById('therapistDetails').classList.add('active');
}

function showMainPage(){
document.getElementById('therapistDetails').classList.remove('active');
document.getElementById('therapistInfo').innerHTML='';
}
</script>

</body>
</html>
