<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindCare | Choose Your Path</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: linear-gradient(rgba(0,30,25,0.55), rgba(0,30,25,0.55)),
                url("forestpon.jpg") no-repeat center/cover;
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
}

/* ================= NAVBAR ================= */

header {
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
}

header h1 {
    font-size: 28px;
    font-weight: 600;
}

header nav a {
    margin-left: 35px;
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    position: relative;
}

header nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    background: white;
    transition: 0.3s ease;
}

header nav a:hover::after {
    width: 100%;
}

/* ================= HERO ================= */

.hero {
    text-align: center;
    padding: 80px 20px 40px;
}

.hero h2 {
    font-size: 44px;
    margin-bottom: 12px;
    font-weight: 600;
}

.hero p {
    font-size: 18px;
    opacity: 0.85;
}

/* ================= PICTURE CARDS ================= */

.paths {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 35px;
    max-width: 1100px;
    margin: 60px auto;
    padding: 0 30px;
}

.path {
    position: relative;
    height: 300px;
    border-radius: 30px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s ease;
}

.path img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
}

/* Dark overlay */
.path::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
    transition: 0.4s ease;
}

/* Hover Effects */
.path:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

.path:hover img {
    transform: scale(1.1);
}

/* Example Button */
.example-btn {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 22px;
    border-radius: 25px;
    border: 1px solid rgba(120, 255, 180, 0.6);
    background: rgba(0, 255, 150, 0.15);
    backdrop-filter: blur(10px);
    color: #b9ffd9;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.4s ease;
}

.path:hover .example-btn {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.example-btn:hover {
    background: rgba(0, 255, 150, 0.3);
    box-shadow: 0 0 20px rgba(0, 255, 150, 0.4);
}

/* ================= BOTTOM BUTTONS ================= */

.bottom-buttons {
    display: flex;
    justify-content: space-between;
    padding: 40px 60px;
}

.back-button {
    padding: 12px 28px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.back-button:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<header>
    <h1>MindCare</h1>
    <nav>
        <a href="Therapist.html">Therapist</a>
        <a href="About.html">About</a>
    </nav>
</header>

<section class="hero">
    <h2>Mindful Stretching</h2>
    <p>Peace comes from within. Do not seek it without.</p>
</section>

<section class="paths">

    <div class="path">
        <img src="MS1.jpg">
        
    </div>

    <div class="path">
        <img src="MS2.jpg">
       
    </div>

    <div class="path">
        <img src="MS3.jpg">
        
    </div>

   

</section>

<div class="bottom-buttons">
    <a href="MRE.html"><button class="back-button">← Back</button></a>
    <a href="Frontpage.html"><button class="back-button">🏠 Back to the Homepage</button></a>
</div>

</body>
</html>
