<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindCare | Daily Mood Check-In</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(rgba(0,30,25,0.6), rgba(0,30,25,0.6)),
        url("forestpon.jpg") no-repeat center center/cover;
    background-attachment:fixed;
    color:white;
}

/* NAVBAR */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 70px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,0.15);
}

.logo{
    font-size:28px;
    font-weight:600;
    color:white;
}

nav a{
    margin-left:40px;
    text-decoration:none;
    color:white;
    font-size:16px;
    opacity:0.9;
    transition:0.3s ease;
}

nav a:hover{
    opacity:1;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* MAIN CONTAINER */
.container{
    max-width:600px;
    margin:80px auto;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    text-align:center;
}

/* MOOD BUTTONS */
.moods{
    margin-top:30px;
}

.mood-btn{
    font-size:40px;
    margin:12px;
    cursor:pointer;
    transition:all 0.25s ease;
    display:inline-block;
}

.mood-btn:hover{
    transform:translateY(-6px) scale(1.3);
    text-shadow:0 0 15px rgba(0,255,150,0.8);
    filter:drop-shadow(0 0 10px rgba(0,255,150,0.6));
}

.mood-btn:active{
    transform:scale(1.1);
}

/* HISTORY */
.history{
    margin-top:30px;
    font-size:14px;
    line-height:1.6;
    opacity:0.9;
    max-height:180px;
    overflow-y:auto;
}

/* QUOTE */
#quote{
    margin-top:25px;
    font-style:italic;
    opacity:0.9;
    font-size:16px;
    transition: opacity 0.4s ease;
}

/* GREEN GLASS BUTTON */
button{
    margin-top:20px;
    padding:10px 22px;
    border-radius:25px;
    border:1px solid rgba(120,255,180,0.6);
    background:rgba(0,255,150,0.12);
    backdrop-filter:blur(12px);
    color:#b9ffd9;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    background:rgba(0,255,150,0.25);
    box-shadow:0 0 20px rgba(0,255,150,0.35);
}

/* BACK TO HOMEPAGE BUTTON */
.back-home{
    position:fixed;
    right:40px;
    bottom:30px;
    padding:12px 26px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    color:white;
    text-decoration:none;
    font-size:14px;
    transition:0.3s ease;
}

.back-home:hover{
    background:rgba(255,255,255,0.25);
    box-shadow:0 0 20px rgba(255,255,255,0.35);
}

@media(max-width:600px){
    .container{
        margin:40px 20px;
        padding:30px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">MindCare</div>
    <nav>
        <a href="Therapist.html">Therapist</a>
        <a href="About.html">About</a>
    </nav>
</header>

<div class="container">

    <h2>How are you feeling today?</h2>

    <div class="moods">
        <span class="mood-btn" onclick="saveMood('😄 Very Happy')">😄</span>
        <span class="mood-btn" onclick="saveMood('🙂 Calm')">🙂</span>
        <span class="mood-btn" onclick="saveMood('😐 Neutral')">😐</span>
        <span class="mood-btn" onclick="saveMood('😔 Sad')">😔</span>
        <span class="mood-btn" onclick="saveMood('😣 Stressed')">😣</span>
    </div>

    <div id="quote"></div>

    <div class="history" id="history"></div>

    <button onclick="clearHistory()">Clear History</button>

</div>

<a href="Frontpage.html" class="back-home">🏠 Back to Homepage</a>

<script>
const moodQuotes = {
    "😄 Very Happy": "Happiness is contagious – spread it wherever you go!",
    "🙂 Calm": "Peace comes from within. Take a deep breath and enjoy the moment.",
    "😐 Neutral": "Even ordinary days have their own magic. Stay mindful.",
    "😔 Sad": "It's okay to feel sad. Healing takes time, and brighter days are ahead.",
    "😣 Stressed": "Breathe. You are stronger than whatever is making you anxious."
};

function saveMood(mood){
    let moods = JSON.parse(localStorage.getItem("moodHistory")) || [];
    let today = new Date();
    let date = today.toLocaleDateString();
    let time = today.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    moods.push(date + " (" + time + ") - " + mood);
    localStorage.setItem("moodHistory", JSON.stringify(moods));
    displayHistory();
    showQuote(mood);
}

function showQuote(mood){
    const quoteDiv = document.getElementById("quote");
    quoteDiv.style.opacity = 0;
    setTimeout(() => {
        quoteDiv.textContent = moodQuotes[mood] || "";
        quoteDiv.style.opacity = 0.9;
    }, 200);
}

function displayHistory(){
    let moods = JSON.parse(localStorage.getItem("moodHistory")) || [];
    let historyDiv = document.getElementById("history");

    historyDiv.innerHTML = "<strong>Last 7 Entries:</strong><br><br>";

    moods.slice(-7).reverse().forEach(entry=>{
        historyDiv.innerHTML += entry + "<br>";
    });
}

function clearHistory(){
    localStorage.removeItem("moodHistory");
    displayHistory();
    document.getElementById("quote").textContent = "";
}

displayHistory();
</script>

</body>
</html>
