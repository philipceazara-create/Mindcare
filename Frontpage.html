<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindCare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

/* NAVBAR */
nav {
  position: absolute;
  width: 100%;
  padding: 20px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  z-index: 100;
}

.logo {
  font-size: 26px;
  font-weight: 700;
  color: white;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: white;
  font-weight: 500;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0%;
  height: 2px;
  background: white;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8%;
  background: linear-gradient(
      to right,
      rgba(0, 0, 0, 0.65),
      rgba(0, 0, 0, 0.25)
    ),
    url("https://images.unsplash.com/photo-1501785888041-af3ef285b470")
    no-repeat center/cover;
  color: white;
}

/* LEFT */
.hero-content {
  max-width: 600px;
  animation: fadeUp 1.2s ease forwards;
}

.hero h1 {
  font-size: 56px;
  line-height: 1.15;
  margin-bottom: 25px;
  text-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.hero p {
  font-size: 18px;
  margin-bottom: 35px;
  opacity: 0.95;
}

/* Clickable buttons */
.buttons {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.buttons button {
  padding: 14px 28px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.buttons button:nth-child(1) {
  background: white;
  color: #0f3d2e;
  animation: glowPulse 2.5s infinite;
}

.buttons button:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.buttons button:nth-child(2),
.buttons button:nth-child(3) {
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.4);
}

/* ICONS */
.icon-container {
  display: flex;
  gap: 40px;
}

.icon-card {
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  animation: float 6s ease-in-out infinite;
  transition: 0.4s ease;
  cursor: default;
}

.icon-card:nth-child(2) {
  animation-delay: 2s;
}

.icon-card:hover {
  transform: translateY(-15px) scale(1.05);
  background: rgba(255,255,255,0.2);
}

/* SVG STYLE */
.icon-card svg {
  width: 90px;
  height: 90px;
  stroke: white;
  stroke-width: 2;
  fill: none;
  animation: breathe 4s ease-in-out infinite;
}

/* Clickable card press effect */
.icon-card:active {
  transform: scale(0.95);
}

/* ANIMATIONS */
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 0 rgba(255,255,255,0.6); }
  50% { box-shadow: 0 0 25px rgba(255,255,255,0.8); }
  100% { box-shadow: 0 0 0 rgba(255,255,255,0.6); }
}

@keyframes breathe {
  0%,100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.08); opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .hero {
    flex-direction: column;
    text-align: center;
    gap: 40px;
  }

  .icon-container {
    flex-direction: column;
  }
}

a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<nav>
  <div class="logo">MindCare</div>
  <ul>
    <li><a href="Therapist.html">Therapist</a></li>
    <li><a href="About.html">About</a></li>
  </ul>
</nav>

<section class="hero">
  
  <div class="hero-content">
    <h1>Life Changing Care for Anxiety and Depression</h1>
    <p>
      Personalized, effective and completely confidential. Discover easily accessible mental health and well being support built for individuals and organizations 
    </p>

    <div class="buttons">
      <button><a href="secondpage.html">Ask For Help</a></button>
      <button><a href="Exercise.html">Exercises</a></button>
      <button><a href="GamePage.html">Games</a></button>
    </div>
  </div>

  <div class="icon-container">
    
    <!-- Meditation SVG -->
    <div class="icon-card" onclick="goToMan()">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="5" r="2"/>
        <path d="M6 22c1-4 3-6 6-6s5 2 6 6"/>
        <path d="M4 14c2 0 3-2 4-3"/>
        <path d="M20 14c-2 0-3-2-4-3"/>
      </svg>
    </div>

    <!-- Heart Hands SVG (Clickable) -->
    <div class="icon-card" onclick="goToMood()">
      <svg viewBox="0 0 24 24">
        <path d="M12 21s-6-4.35-9-8.5C-1 6 5 2 12 8c7-6 13-2 9 4.5C18 16.65 12 21 12 21z"/>
      </svg>
    </div>

  </div>

</section>

<script>
function goToMood(){
  window.location.href = "moodchecker.html"; 
 
}

function goToMan(){
  window.location.href = "try.html"; 
 
}
</script>

</body>
</html>
