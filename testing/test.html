<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Header Styles */
        header {
            background-color: #e0ebe0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d5d2a;
        }

        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #2d5d2a;
            font-weight: 500;
        }

        .lang-btn {
            padding: 0.3rem 0.8rem;
            border: 1px solid #2d5d2a;
            border-radius: 4px;
            background: transparent;
            color: #2d5d2a;
            cursor: pointer;
        }

        /* Hero Section Styles */
        .hero {
            position: relative;
            background: linear-gradient(rgba(45, 93, 42, 0.7), rgba(45, 93, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1504639725590-34d0984388bd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
            color: white;
            padding: 4rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem;
        }

        .hero-text {
            flex: 1 1 300px;
        }

        .hero-text h1 {
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        .hero-text p {
            font-size: 1rem;
            max-width: 400px;
        }

        .icons {
            flex: 1 1 200px;
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .icon-card {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
        }

        .icon-card svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        /* Bottom Links */
        .bottom-links {
            position: absolute;
            bottom: 1.5rem;
            left: 2rem;
            display: flex;
            gap: 1.5rem;
        }

        .bottom-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            border-right: 2px solid white;
            padding-right: 1.5rem;
        }

        .bottom-links a:last-child {
            border: none;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .bottom-links {
                position: static;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MindCare</div>
        <nav>
            <a href="#">Therapist</a>
            <a href="#">About</a>
            <button class="lang-btn">ENGLISH</button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>Life Changing<br>Care for Anxiety<br>and Depression</h1>
            <p>Personalized, effective and completely confidential. Discover easily accessible mental health and well-being support built for individuals and organizations</p>
        </div>
        <div class="icons">
            <div class="icon-card">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <div class="icon-card">
                <svg viewBox="0 0 24 24">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V6h1.5z"/>
                </svg>
            </div>
        </div>
        <div class="bottom-links">
            <a href="#">Ask For Help</a>
            <a href="#">Exercises</a>
            <a href="#">Games</a>
        </div>
    </section>
</body>
</html>
