<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Tetris</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: #0ff;
    overflow: hidden;
    background: radial-gradient(circle at center, #050010 0%, #000000 100%);
}

#universeCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* Home Page */
#homePage, #gamePage {
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#homePage {
    background: rgba(0,0,0,0.6);
}

#homePage h1 {
    font-size: 64px;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    margin-bottom: 50px;
}

#homePage .homeButtons {
    display:flex;
    gap:20px;
    flex-direction:column;
    align-items:center;
}

#homePage button {
    padding: 20px 50px;
    font-size: 28px;
    color: #0ff;
    background: transparent;
    border: 2px solid #0ff;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: 0 0 5px #0ff;
    transition: all 0.2s ease;
}

#homePage button:hover {
    background: #0ff;
    color: #111;
    box-shadow: 0 0 20px #0ff;
}

/* Game Page */
#gamePage {
    display:none;
    flex-direction: row;
    gap:30px;
    align-items:flex-start;
}

#tetris {
    background: rgba(0,0,0,0.7);
    border: 4px solid #0ff;
    box-shadow: 0 0 20px #0ff;
}

.sidebar {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.sidebar h1 {
    font-size:36px;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
}

#scoreBoard {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    width:160px;
    text-align:center;
    border: 2px solid #0ff;
    box-shadow: 0 0 15px #0ff;
    border-radius:10px;
}

#nextPiece {
    margin-top:15px;
    background:#111;
    width:120px;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid #0ff;
    box-shadow:0 0 10px #0ff;
    border-radius:8px;
}

#gameOverOverlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#0ff;
    font-size:32px;
    text-align:center;
    display:none;
}

#gameOverOverlay button {
    margin-top:15px;
    padding:10px 25px;
    font-size:20px;
    color:#0ff;
    background:transparent;
    border:2px solid #0ff;
    border-radius:8px;
    cursor:pointer;
    text-shadow:0 0 5px #0ff;
    transition: all 0.2s ease;
}

#gameOverOverlay button:hover {
    background:#0ff;
    color:#111;
    box-shadow:0 0 20px #0ff;
}
</style>
</head>
<body>
<canvas id="universeCanvas"></canvas>

<!-- Home Page -->
<div id="homePage">
    <h1>NEON TETRIS</h1>
    <div class="homeButtons">
        <button id="startBtn">Start Game</button>
        <button id="homeBtnStart1">Home</button>
    </div>
</div>

<!-- Game Page -->
<div id="gamePage">
    <canvas id="tetris" width="360" height="720"></canvas>
    <div class="sidebar">
        <h1>NEON TETRIS</h1>
        <div id="scoreBoard">
            <div>Score</div>
            <div id="score">0</div>
            <div>Next</div>
            <canvas id="nextPiece" width="120" height="120"></canvas>
        </div>
    </div>
    <div id="gameOverOverlay">
        <div>GAME OVER</div>
        <button id="restartBtn">Restart</button>
        <button id="homeBtn">Home</button>
    </div>
</div>

<script>
// --- Universe background ---
const universeCanvas = document.getElementById('universeCanvas');
const uctx = universeCanvas.getContext('2d');
let stars = [];

function resizeCanvas(){ universeCanvas.width=window.innerWidth; universeCanvas.height=window.innerHeight; initStars();}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function initStars(){
    stars = [];
    for(let i=0;i<200;i++){
        stars.push({
            x:Math.random()*universeCanvas.width,
            y:Math.random()*universeCanvas.height,
            size: Math.random()*2+0.5,
            speed: Math.random()*0.2+0.05
        });
    }
}

function drawUniverse(){
    uctx.clearRect(0,0,universeCanvas.width,universeCanvas.height);
    const gradient = uctx.createRadialGradient(universeCanvas.width/2, universeCanvas.height/2, 0, universeCanvas.width/2, universeCanvas.height/2, universeCanvas.width);
    gradient.addColorStop(0,'rgba(0,50,100,0.3)');
    gradient.addColorStop(0.5,'rgba(50,0,100,0.2)');
    gradient.addColorStop(1,'rgba(0,0,0,0.8)');
    uctx.fillStyle = gradient;
    uctx.fillRect(0,0,universeCanvas.width,universeCanvas.height);

    stars.forEach(s=>{
        uctx.fillStyle = '#0ff';
        uctx.shadowColor = '#0ff';
        uctx.shadowBlur = 5;
        uctx.beginPath();
        uctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        uctx.fill();
        s.y -= s.speed;
        if(s.y<0){ s.y=universeCanvas.height; s.x=Math.random()*universeCanvas.width; }
    });
    requestAnimationFrame(drawUniverse);
}
drawUniverse();

// --- Page switching ---
const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
document.getElementById("startBtn").addEventListener("click", ()=>{
    homePage.style.display="none";
    gamePage.style.display="flex";
    startGame();
});

// --- Home button on start page ---
document.getElementById("homeBtnStart1").addEventListener("click", ()=>{
    
    // Or link to main menu
});

// --- Tetris code ---
const canvas = document.getElementById("tetris");
const context = canvas.getContext("2d");
context.scale(36,36);

const nextCanvas = document.getElementById("nextPiece");
const nextCtx = nextCanvas.getContext("2d");
nextCtx.scale(23,23);

const COLS = 10, ROWS = 20;
let dropInterval = 1000, dropCounter = 0, lastTime = 0, linesCleared = 0;
const colors=[null,"#ff00ff","#ffff00","#ff8000","#00bfff","#00ffff","#00ff00","#ff0000"];
const pieces='ILJOTSZ';
const arena=createMatrix(COLS,ROWS);
const player={pos:{x:0,y:0},matrix:null};
const next={matrix:createPiece(pieces[Math.floor(Math.random()*pieces.length)])};
let score=0;

function createMatrix(w,h){ const matrix=[]; while(h--) matrix.push(new Array(w).fill(0)); return matrix;}
function createPiece(type){ if(type==='T') return [[0,1,0],[1,1,1],[0,0,0]]; if(type==='O') return [[2,2],[2,2]]; if(type==='L') return [[0,3,0],[0,3,0],[0,3,3]]; if(type==='J') return [[0,4,0],[0,4,0],[4,4,0]]; if(type==='I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]]; if(type==='S') return [[0,6,6],[6,6,0],[0,0,0]]; if(type==='Z') return [[7,7,0],[0,7,7],[0,0,0]];}
function drawMatrix(matrix, offset, ctx=context, ghost=false){ matrix.forEach((row,y)=>{ row.forEach((value,x)=>{ if(value!==0){ ctx.fillStyle=ghost?colors[value]+'66':colors[value]; ctx.shadowColor=ghost?'transparent':colors[value]; ctx.shadowBlur=ghost?0:15; ctx.fillRect(x+offset.x,y+offset.y,1,1); } }); });}
function merge(arena,player){ player.matrix.forEach((row,y)=>{ row.forEach((value,x)=>{ if(value!==0) arena[y+player.pos.y][x+player.pos.x]=value; }); }); }
function collide(arena,player){ const [m,o]=[player.matrix,player.pos]; for(let y=0;y<m.length;y++){ for(let x=0;x<m[y].length;x++){ if(m[y][x]!==0 && (arena[y+o.y] && arena[y+o.y][x+o.x])!==0) return true; } } return false;}
function rotate(matrix){ for(let y=0;y<matrix.length;y++){ for(let x=0;x<y;x++){ [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]]; } } matrix.forEach(row=>row.reverse()); }
function arenaSweep(){ let rowCount=1, clearedLines=0; outer: for(let y=arena.length-1;y>=0;--y){ for(let x=0;x<arena[y].length;x++){ if(arena[y][x]===0) continue outer;} const row=arena.splice(y,1)[0].fill(0); arena.unshift(row); clearedLines++; score+=rowCount*10; rowCount*=2; y++; } if(clearedLines>0){ linesCleared+=clearedLines; dropInterval=Math.max(200,1000-Math.floor(linesCleared/10)*100); flashLineEffect(clearedLines); } document.getElementById("score").innerText=score;}
function flashLineEffect(lines){ context.fillStyle="#0ff"; context.globalAlpha=0.2; context.fillRect(0,0,canvas.width,canvas.height); context.globalAlpha=1; }
function playerDrop(){ player.pos.y++; if(collide(arena,player)){ player.pos.y--; merge(arena,player); playerReset(); arenaSweep(); } dropCounter=0; }
function playerMove(dir){ player.pos.x+=dir; if(collide(arena,player)) player.pos.x-=dir; }
function playerRotate(){ rotate(player.matrix); if(collide(arena,player)){ rotate(player.matrix); rotate(player.matrix); rotate(player.matrix); } }
function drawGhost(){ const ghostPos={x:player.pos.x,y:player.pos.y}; while(!collide(arena,{matrix:player.matrix,pos:ghostPos})) ghostPos.y++; ghostPos.y--; drawMatrix(player.matrix,ghostPos,context,true); }
function draw(){ context.fillStyle="rgba(0,0,0,0.7)"; context.fillRect(0,0,canvas.width,canvas.height); drawMatrix(arena,{x:0,y:0}); drawGhost(); drawMatrix(player.matrix,player.pos); drawNext(); }
function drawNext(){ nextCtx.fillStyle="#111"; nextCtx.fillRect(0,0,nextCanvas.width/23,nextCanvas.height/23); drawMatrix(next.matrix,{x:1,y:1},nextCtx); }
function showGameOver(){ document.getElementById("gameOverOverlay").style.display="flex"; }
function hideGameOver(){ document.getElementById("gameOverOverlay").style.display="none"; }
function playerReset(){ player.matrix=next.matrix; player.pos.y=0; player.pos.x=(COLS/2|0)-(player.matrix[0].length/2|0); next.matrix=createPiece(pieces[Math.floor(Math.random()*pieces.length)]); if(collide(arena,player)) showGameOver(); }
function restartGame(){ arena.forEach(row=>row.fill(0)); score=0; linesCleared=0; dropInterval=1000; document.getElementById("score").innerText=score; hideGameOver(); playerReset(); }
function goHome(){ hideGameOver(); gamePage.style.display="none"; homePage.style.display="flex"; }

document.addEventListener("keydown",event=>{ if(event.key==="ArrowLeft") playerMove(-1); else if(event.key==="ArrowRight") playerMove(1); else if(event.key==="ArrowDown") playerDrop(); else if(event.key==="ArrowUp") playerRotate(); });
document.getElementById("restartBtn").addEventListener("click",restartGame);
document.getElementById("homeBtn")

function update(time=0){ const deltaTime=time-lastTime; lastTime=time; dropCounter+=deltaTime; if(dropCounter>dropInterval) playerDrop(); draw(); requestAnimationFrame(update); }
function startGame(){ playerReset(); update(); }

// ===== Page Switching =====
const HomePage = document.getElementById("homePage");
const GamePage = document.getElementById("gamePage");

document.getElementById("startBtn").addEventListener("click", ()=>{
    homePage.style.display="none";
    gamePage.style.display="flex";
});

// 🔥 HOME BUTTONS NOW WORK 🔥
document.getElementById("homeBtnStart1").addEventListener("click", ()=>{
    window.location.href = "Gamepage.html";
});

document.getElementById("homeBtn").addEventListener("click", ()=>{
    window.location.href = "Gamepage.html";
});

// Restart Button
document.getElementById("restartBtn").addEventListener("click", ()=>{
    document.getElementById("gameOverOverlay").style.display="none";
});
</script>
</body>
</html>
