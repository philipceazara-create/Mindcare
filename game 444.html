<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  h1 {
    margin-bottom: 10px;
    font-size: 36px;
    text-shadow: 2px 2px 5px #000;
    z-index: 2;
    position: relative;
  }
  canvas {
    border: 4px solid #fff;
    border-radius: 15px;
    z-index: 2;
    position: relative;
  }
  #score {
    margin-top: 10px;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 1px 1px 3px #000;
    z-index: 2;
    position: relative;
  }
  .buttons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    z-index: 2;
    position: relative;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #6a0dad;
    color: #fff;
    font-weight: bold;
    transition: 0.3s;
  }
  button:hover {
    background: #9b30ff;
  }
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 28px;
    display: none;
    z-index: 5;
  }
  #overlay button {
    margin-top: 20px;
  }
  /* Full-screen background canvas */
  #bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<h1>Snake Game</h1>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<div id="score">Score: 0</div>
<div class="buttons">
  <button onclick="restartGame()">Restart</button>
  <button onclick="goHome()">Home</button>
</div>

<div id="overlay">
  <div id="gameOverText"></div>
  <button onclick="restartGame()">Play Again</button>
</div>

<script>
  // ====== Full-screen background setup ======
  const bgCanvas = document.getElementById("bgCanvas");
  const bgCtx = bgCanvas.getContext("2d");

  function resizeBackground() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resizeBackground);
  resizeBackground();

  const particles = [];
  const particleCount = 150; // more particles for full screen

  for(let i = 0; i < particleCount; i++) {
    particles.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      size: Math.random() * 3 + 1,
      speedX: (Math.random() - 0.5) * 1.5,
      speedY: (Math.random() - 0.5) * 1.5
    });
  }

  function animateBackground() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    for(let i = 0; i < particles.length; i++) {
      const p = particles[i];
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      bgCtx.fillStyle = "rgba(255,255,255,0.5)";
      bgCtx.fill();
      p.x += p.speedX;
      p.y += p.speedY;

      // Bounce off walls
      if(p.x < 0 || p.x > bgCanvas.width) p.speedX *= -1;
      if(p.y < 0 || p.y > bgCanvas.height) p.speedY *= -1;
    }
    requestAnimationFrame(animateBackground);
  }
  animateBackground();

  // ====== Snake Game Setup ======
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const gameOverText = document.getElementById("gameOverText");
  const scoreDisplay = document.getElementById("score");

  const box = 20;
  const canvasSize = 400;
  let score = 0;
  let snake;
  let food;
  let d;
  let game;

  // Snake skins
  const snakeSkins = [
    { head: "#00FF00", body: "#0f0" },
    { head: "#FFD700", body: "#FFA500" },
    { head: "#00FFFF", body: "#008B8B" },
    { head: "#FF69B4", body: "#FF1493" },
  ];
  let currentSkin;

  function init() {
    score = 0;
    scoreDisplay.innerText = "Score: 0";
    snake = [];
    snake[0] = { x: 9 * box, y: 9 * box };
    food = {
      x: Math.floor(Math.random() * (canvasSize / box)) * box,
      y: Math.floor(Math.random() * (canvasSize / box)) * box
    };
    d = undefined;
    currentSkin = snakeSkins[Math.floor(Math.random() * snakeSkins.length)];
    overlay.style.display = "none";
    clearInterval(game);
    game = setInterval(draw, 100);
  }

  document.addEventListener("keydown", direction);
  function direction(event) {
    if(event.key === "ArrowLeft" && d !== "RIGHT") d = "LEFT";
    else if(event.key === "ArrowUp" && d !== "DOWN") d = "UP";
    else if(event.key === "ArrowRight" && d !== "LEFT") d = "RIGHT";
    else if(event.key === "ArrowDown" && d !== "UP") d = "DOWN";
  }

  function collision(head, array) {
    for(let i = 0; i < array.length; i++) {
      if(head.x === array[i].x && head.y === array[i].y) return true;
    }
    return false;
  }

  function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw snake
    for(let i = 0; i < snake.length; i++) {
      ctx.fillStyle = (i === 0) ? currentSkin.head : currentSkin.body;
      ctx.fillRect(snake[i].x, snake[i].y, box, box);
      ctx.strokeStyle = "#000";
      ctx.strokeRect(snake[i].x, snake[i].y, box, box);
    }

    // Draw food
    ctx.fillStyle = "#FF0000";
    ctx.fillRect(food.x, food.y, box, box);

    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if(d === "LEFT") snakeX -= box;
    if(d === "UP") snakeY -= box;
    if(d === "RIGHT") snakeX += box;
    if(d === "DOWN") snakeY += box;

    // Eat food
    if(snakeX === food.x && snakeY === food.y) {
      score++;
      scoreDisplay.innerText = "Score: " + score;
      food = {
        x: Math.floor(Math.random() * (canvasSize / box)) * box,
        y: Math.floor(Math.random() * (canvasSize / box)) * box
      };
    } else {
      snake.pop();
    }

    let newHead = { x: snakeX, y: snakeY };

    if(snakeX < 0 || snakeX >= canvasSize || snakeY < 0 || snakeY >= canvasSize || collision(newHead, snake)) {
      clearInterval(game);
      gameOverText.innerText = "Game Over! Your score: " + score;
      overlay.style.display = "flex";
      return;
    }

    snake.unshift(newHead);
  }

  function restartGame() { init(); }
  function goHome() {
     window.location.href = "Gamepage.html"; 
    overlay.style.display = "none";
    clearInterval(game);
    snake = [];
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    score = 0;
    scoreDisplay.innerText = "Score: " + score;
  }

  init();
</script>
</body>
</html>
